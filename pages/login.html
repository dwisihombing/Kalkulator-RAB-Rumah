<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RABPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #1a9e6f;
      --green-d: #0f7a54;
      --green-l: #e8f7f1;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f4;
      --gray-200: #e8eaed;
      --gray-600: #5f6368;
      --gray-800: #202124;
      --white: #ffffff;
      --shadow-md: 0 4px 12px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
      --radius-lg: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--green-l) 0%, var(--gray-50) 100%);
      color: var(--gray-800);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-logo {
      background: var(--green);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      letter-spacing: .3px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .login-header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--gray-800);
    }

    .login-header p {
      color: var(--gray-600);
      font-size: 14px;
      line-height: 1.5;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .oauth-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      background: var(--white);
      color: var(--gray-800);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: flex;
    }

    .oauth-button:hover {
      background: var(--gray-50);
      border-color: var(--gray-600);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .oauth-button svg {
      width: 18px;
      height: 18px;
    }

    .divider {
      text-align: center;
      margin: 24px 0 20px;
      position: relative;
      color: var(--gray-600);
      font-size: 13px;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: var(--gray-200);
      z-index: 0;
    }

    .divider span {
      background: var(--white);
      padding: 0 8px;
      position: relative;
      z-index: 1;
    }

    .demo-login {
      padding: 16px;
      background: var(--green-l);
      border-radius: 8px;
      text-align: center;
    }

    .demo-login p {
      color: var(--gray-600);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .demo-login button {
      background: var(--green);
      color: var(--white);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .demo-login button:hover {
      background: var(--green-d);
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--gray-600);
      font-size: 12px;
    }

    .footer a {
      color: var(--green);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .oauth-button.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .oauth-button.loading .loading-spinner {
      display: inline-block;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }

      .login-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="brand-logo">RABPro</div>
      <h1>Selamat Datang</h1>
      <p>Masuk untuk menyimpan dan melanjutkan progres perhitungan RAB Anda</p>
    </div>

    <form class="login-form">
      <a href="/auth/google" class="oauth-button" onclick="showLoading(event)">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12.5 9c1.6 0 3 1.4 3 3s-1.4 3-3 3-3-1.4-3-3 1.4-3 3-3m0-2c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5" fill="#000"/>
          <path d="M2 6h20v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6" stroke="#000" stroke-width="2"/>
        </svg>
        Google
      </a>

      <a href="/auth/github" class="oauth-button" onclick="showLoading(event)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </a>

      <div class="divider">
        <span>atau</span>
      </div>

      <div class="demo-login">
        <p>Ingin mencoba tanpa login?</p>
        <button type="button" onclick="tryDemo()">Gunakan Mode Demo</button>
      </div>
    </form>

    <div class="footer">
      <p>Dengan masuk, Anda menyetujui <a href="#">Kebijakan Privasi</a> kami</p>
    </div>
  </div>

  <script>
    function showLoading(event) {
      // event.target.classList.add('loading');
      // event.target.querySelector('.loading-spinner').style.display = 'inline-block';
    }

    function tryDemo() {
      // Set demo mode in localStorage
      localStorage.setItem('demoMode', 'true');
      localStorage.setItem('demoUser', JSON.stringify({
        name: 'Demo User',
        email: 'demo@rabpro.local',
        avatar_url: 'https://via.placeholder.com/100'
      }));
      window.location.href = '/pages/home.html';
    }

    // Check if user is already logged in
    checkAuthStatus();

    async function checkAuthStatus() {
      try {
        const response = await fetch('/api/user');
        if (response.ok) {
          // User is already logged in, redirect to home
          window.location.href = '/pages/home.html';
        }
      } catch (err) {
        // User is not logged in, stay on login page
        console.log('User not authenticated');
      }
    }
  </script>
</body>
</html>
